name: Sync Registry to TemplateMarket

on:
  push:
    branches: [main]
    paths:
      - 'registry.json'
      - 'assets/covers/**'

jobs:
  sync:
    name: POST /functions/sync-templates
    runs-on: ubuntu-latest
    steps:
      - name: Trigger sync
        env:
          TOKEN: ${{ secrets.TEMPLATE_SYNC_TOKEN }}
          SHA: ${{ github.sha }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::error::TEMPLATE_SYNC_TOKEN secret not set; configure it in repo settings before merging."
            exit 1
          fi
          curl -fSs -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            "https://p8n7m7ci.us-east.insforge.app/functions/sync-templates" \
            -d "{\"commit_sha\":\"$SHA\"}"
          echo
          echo "Sync completed for commit $SHA"
